<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dead Ringer — Admin Trade</title>
  <style>
    /* Matches the Dead Ringer noir editorial palette */
    :root {
      --ink: oklch(95% 0 0);
      --dim: oklch(55% 0 0);
      --bg: oklch(8% 0 0);
      --surface: oklch(14% 0 0);
      --accent: oklch(78% 0.18 140);
      --danger: oklch(68% 0.22 25);
      --mono: "JetBrains Mono", "Fira Mono", ui-monospace, monospace;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--ink);
      font-family: var(--mono);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem;
    }
    h1 { font-size: 1.1rem; letter-spacing: 0.15em; color: var(--accent); margin-bottom: 2rem; }
    form {
      background: var(--surface);
      border: 1px solid oklch(25% 0 0);
      padding: 2rem;
      width: min(420px, 100%);
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }
    label { font-size: 0.75rem; letter-spacing: 0.1em; color: var(--dim); display: block; margin-bottom: 0.3rem; }
    input, select {
      width: 100%;
      background: var(--bg);
      border: 1px solid oklch(30% 0 0);
      color: var(--ink);
      font-family: var(--mono);
      font-size: 0.9rem;
      padding: 0.5rem 0.75rem;
      outline: none;
    }
    input:focus, select:focus { border-color: var(--accent); }
    button {
      background: var(--accent);
      color: var(--bg);
      border: none;
      font-family: var(--mono);
      font-size: 0.85rem;
      letter-spacing: 0.12em;
      padding: 0.65rem 1.5rem;
      cursor: pointer;
      margin-top: 0.5rem;
      font-weight: 700;
    }
    button:hover { filter: brightness(1.1); }
    #result {
      margin-top: 1.5rem;
      width: min(420px, 100%);
      font-size: 0.78rem;
      white-space: pre-wrap;
      word-break: break-all;
      color: var(--dim);
    }
    #result.ok  { color: var(--accent); }
    #result.err { color: var(--danger); }
  </style>
</head>
<body>
  <h1>DEAD RINGER // ADMIN TRADE INJECTOR</h1>

  <form id="tradeForm">
    <div>
      <label for="suspectId">SUSPECT ID</label>
      <select id="suspectId" name="suspectId" required>
        <option value="5">Suspect 5 (human slot)</option>
        <option value="6">Suspect 6 (human slot)</option>
        <option value="7">Suspect 7 (human slot)</option>
        <option value="8">Suspect 8 (human slot)</option>
      </select>
    </div>
    <div>
      <label for="side">SIDE</label>
      <select id="side" name="side" required>
        <option value="BUY">BUY</option>
        <option value="SELL">SELL</option>
      </select>
    </div>
    <div>
      <label for="pair">PAIR</label>
      <select id="pair" name="pair" required>
        <option value="ETH/USD">ETH/USD</option>
        <option value="BTC/USD">BTC/USD</option>
      </select>
    </div>
    <div>
      <label for="size">SIZE (base asset)</label>
      <input type="number" id="size" name="size" step="0.001" min="0.001" value="0.1" required />
    </div>
    <button type="submit">SUBMIT PAPER TRADE</button>
  </form>

  <pre id="result"></pre>

  <script>
    const form = document.getElementById("tradeForm");
    const result = document.getElementById("result");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      result.textContent = "submitting…";
      result.className = "";

      const body = {
        suspectId: Number(document.getElementById("suspectId").value),
        side: document.getElementById("side").value,
        pair: document.getElementById("pair").value,
        size: Number(document.getElementById("size").value),
      };

      try {
        const res = await fetch("/admin/trade", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(body),
        });
        const json = await res.json();
        result.className = res.ok ? "ok" : "err";
        result.textContent = JSON.stringify(json, null, 2);
      } catch (err) {
        result.className = "err";
        result.textContent = "Error: " + err.message;
      }
    });

    // Live trade feed preview
    const proto = location.protocol === "https:" ? "wss" : "ws";
    const ws = new WebSocket(`${proto}://${location.host}/stream`);
    ws.onmessage = (e) => {
      const msg = JSON.parse(e.data);
      if (msg.type === "history") {
        console.log("[stream] history:", msg.payload.length, "trades");
      } else {
        console.log("[stream]", msg.type, msg.payload);
      }
    };
  </script>
</body>
</html>
